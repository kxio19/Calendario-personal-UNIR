<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Guardias</title>
    
    <!-- PWA Config -->
    <meta name="theme-color" content="#1f2937">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        .dia-pasado { opacity: 0.35; text-decoration: line-through; }
        .transition-all { transition-duration: 200ms; }
    </style>
</head>
<body class="bg-gray-200 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans min-h-screen pb-10 transition-colors duration-300">



    <!-- CABECERA PRINCIPAL -->
    <header class="bg-gray-50 dark:bg-gray-800 shadow-sm sticky top-0 z-30 transition-colors duration-300">
        <div class="max-w-md mx-auto p-4 flex justify-between items-center gap-2">
            <div class="flex items-center gap-2">
                <div class="relative">
                    <select id="select-anio" class="appearance-none bg-transparent text-xl font-black text-gray-800 dark:text-gray-100 focus:outline-none cursor-pointer pr-4"></select>
                    <span class="absolute right-0 top-1.5 text-xs pointer-events-none opacity-50">▼</span>
                </div>
                <span id="cloud-status" class="text-base w-8 h-8 rounded-full font-bold hidden items-center justify-center shadow-sm transition-colors duration-500">☁️</span>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-toggle-candado" class="p-2 rounded-xl text-lg font-bold shadow-sm transition-all active:scale-95 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-100">🔓</button>
                <button id="btn-abrir-stats" class="bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-100 p-2 rounded-xl text-lg font-bold shadow-sm transition-colors active:scale-95">📊</button>
                <button id="btn-toggle-dinero" class="bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-100 px-3 py-2 rounded-xl text-sm font-black shadow-sm flex items-center gap-1 active:scale-95">
                    <span id="total-global">0 €</span> <span id="icono-ojo" class="ml-1 opacity-70 text-xs">👁️</span>
                </button>
            </div>
        </div>
    </header>

    <main id="contenedor-meses" class="max-w-md mx-auto p-4 space-y-6"></main>

    <!-- BOTONES FLOTANTES -->
    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-20">
        <button id="btn-hoy" class="w-14 h-14 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-transform">📅</button>
        <button id="btn-tema" class="w-14 h-14 bg-gray-800 dark:bg-yellow-400 text-white dark:text-gray-900 rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-transform">🌓</button>
    </div>

    <!-- MODAL ESTADÍSTICAS -->
    <div id="modal-stats" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-gray-50 dark:bg-gray-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl overflow-y-auto max-h-[85vh] border dark:border-gray-700">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black dark:text-white flex items-center gap-2 uppercase tracking-tight">📊 Resumen <span id="stats-year-label" class="text-blue-600"></span></h3>
                <button id="btn-cerrar-stats" class="text-gray-400 text-3xl font-light">&times;</button>
            </div>
            <div class="space-y-4">
                <div class="bg-white dark:bg-gray-700 p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100 dark:border-gray-600">
                    <div><p class="font-bold dark:text-white text-xs opacity-60">Vacaciones (V)</p><input type="number" id="input-base-v" class="mt-1 w-14 text-sm font-bold border rounded p-1 dark:bg-gray-600 dark:text-white text-center" value="22"></div>
                    <p class="text-xl font-black text-emerald-600"><span id="count-v">0</span> <span class="text-xs text-gray-400 font-normal">/</span> <span id="display-base-v">22</span></p>
                </div>
                <div class="bg-white dark:bg-gray-700 p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100 dark:border-gray-600">
                    <div><p class="font-bold dark:text-white text-xs opacity-60">Asuntos Propios (AP)</p><input type="number" id="input-base-ap" class="mt-1 w-14 text-sm font-bold border rounded p-1 dark:bg-gray-600 dark:text-white text-center" value="6"></div>
                    <p class="text-xl font-black text-teal-600"><span id="count-ap">0</span> <span class="text-xs text-gray-400 font-normal">/</span> <span id="display-base-ap">6</span></p>
                </div>
                <div class="bg-white dark:bg-gray-700 p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100 dark:border-gray-600">
                    <p class="font-bold dark:text-white text-sm">Balance Horas Extras</p>
                    <p class="text-xl font-black" id="total-horas-global">0h</p>
                </div>
                <div class="pt-2">
                    <p class="text-[10px] font-black uppercase text-gray-400 mb-2 px-1">Conteo de Guardias</p>
                    <div id="contenedor-desglose-guardias" class="grid grid-cols-2 gap-2 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EDICIÓN DÍA -->
    <div id="modal-turno" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-end sm:items-center justify-center z-40 p-4 backdrop-blur-sm">
        <div class="bg-gray-50 dark:bg-gray-800 w-full max-w-md sm:rounded-3xl rounded-t-3xl p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 id="titulo-modal" class="text-xl font-black dark:text-white tracking-tight">Día Seleccionado</h3>
                <button id="btn-cerrar-modal" class="text-gray-400 text-4xl font-light">&times;</button>
            </div>
            
            <div id="vista-principal" class="grid grid-cols-2 gap-2">
                <button class="opcion-turno p-4 rounded-2xl bg-blue-100 dark:bg-blue-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="M7">M7</button>
                <button id="btn-menu-guardias" class="p-4 rounded-2xl bg-red-100 dark:bg-red-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform">GUARDIA...</button>
                <button class="opcion-turno p-4 rounded-2xl bg-cyan-100 dark:bg-cyan-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="M8">M8</button>
                <button class="opcion-turno p-4 rounded-2xl bg-rose-100 dark:bg-rose-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="guardia" data-subtipo="F" data-precio="150">FESTIVO</button>
                <button class="opcion-turno p-4 rounded-2xl bg-sky-100 dark:bg-sky-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="M9">M9</button>
                <button class="opcion-turno p-4 rounded-2xl bg-green-100 dark:bg-green-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="L">LIBRANZA</button>
                <button class="opcion-turno p-4 rounded-2xl bg-orange-100 dark:bg-orange-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="TT">TARDE</button>
                <button class="opcion-turno p-4 rounded-2xl bg-emerald-100 dark:bg-emerald-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="V">VACACIONES</button>
                <button id="btn-menu-sedes" class="p-4 rounded-2xl bg-purple-100 dark:bg-purple-900 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform">SEDE...</button>
                <button class="opcion-turno p-4 rounded-2xl bg-green-200 dark:bg-green-800 dark:text-white font-black text-sm shadow-sm active:scale-95 transition-transform" data-categoria="turno" data-tipo="IV">INTENTO V.</button>
                
                <div class="col-span-2 grid grid-cols-3 gap-2 mt-6 pt-5 border-t dark:border-gray-700">
                    <button class="opcion-turno p-2 rounded-xl bg-gray-200 dark:bg-gray-700 text-[10px] font-black uppercase" data-categoria="turno" data-tipo="ninguno">Borrar Turno</button>
                    <button class="opcion-turno p-2 rounded-xl bg-gray-200 dark:bg-gray-700 text-[10px] font-black uppercase" data-categoria="guardia" data-subtipo="ninguno">Borrar Guardia</button>
                    <button class="opcion-turno p-2 rounded-xl bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-300 text-[10px] font-black uppercase" data-categoria="borrar">Borrar Todo</button>
                </div>
            </div>

            <div id="vista-guardias" class="hidden">
                <button id="btn-volver-principal" class="mb-4 text-sm font-black text-blue-600 flex items-center gap-1 uppercase tracking-tighter">← Volver a opciones</button>
                <div id="grid-guardias" class="grid grid-cols-3 gap-2"></div>
            </div>

            <div id="vista-sedes" class="hidden">
                <button id="btn-volver-principal-sedes" class="mb-4 text-sm font-black text-purple-600 flex items-center gap-1 uppercase tracking-tighter">← Volver a opciones</button>
                <div id="grid-sedes" class="grid grid-cols-2 gap-2"></div>
            </div>

            <div class="mt-8 pt-5 border-t dark:border-gray-700">
                <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block">Nota Personalizada</label>
                <input type="text" id="input-nota" class="w-full border-2 dark:border-gray-600 rounded-2xl p-4 bg-white dark:bg-gray-700 text-sm focus:ring-4 focus:ring-blue-500/20 outline-none transition-all shadow-inner" placeholder="Escribe algo para recordar...">
                
                <div class="mt-5 flex items-center justify-between bg-white dark:bg-gray-700 p-4 rounded-3xl shadow-inner border dark:border-gray-600">
                    <span class="text-xs font-black uppercase opacity-40">⏱️ Horas Extras</span>
                    <div class="flex items-center gap-5">
                        <button id="btn-restar-hora-dia" class="w-10 h-10 rounded-2xl bg-red-100 text-red-700 font-black text-2xl active:scale-90 transition-transform shadow-sm">-</button>
                        <span id="count-horas-dia" class="font-black text-xl w-10 text-center">0</span>
                        <button id="btn-sumar-hora-dia" class="w-10 h-10 rounded-2xl bg-green-100 text-green-700 font-black text-2xl active:scale-90 transition-transform shadow-sm">+</button>
                    </div>
                </div>
                <button id="btn-guardar-nota" class="mt-6 w-full py-5 bg-blue-600 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-transform uppercase tracking-widest">GUARDAR DÍA</button>
            </div>
        </div>
    </div>

    <!-- MODAL PROMPT SEDE PERSONALIZADA -->
    <div id="modal-prompt" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4 backdrop-blur-md">
        <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] p-8 w-full max-w-xs shadow-2xl border dark:border-gray-700">
            <h4 class="font-black text-lg mb-4 dark:text-white text-center">NUEVA SEDE</h4>
            <input type="text" id="input-sede-personalizada" class="w-full border-2 dark:border-gray-600 rounded-2xl p-4 mb-6 dark:bg-gray-700 dark:text-white text-center font-bold" maxlength="10" placeholder="Ej: JUZGADO 3">
            <div class="flex justify-center gap-4">
                <button id="btn-cancelar-prompt" class="px-6 py-2 text-gray-400 font-black uppercase text-xs">Cancelar</button>
                <button id="btn-aceptar-prompt" class="px-8 py-3 bg-purple-600 text-white rounded-2xl font-black shadow-lg uppercase text-xs">Aceptar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. CONFIGURACIÓN FIREBASE (KAIO) ---
        // Aquí he puesto tus claves reales de Kaio (vistas en image_71eb07.png)
        let firebaseConfig = {
            apiKey: "AIzaSyCI1WIEEwT8f5ifD0p6_YXqRnNJ4Xzcx9Q",
            authDomain: "calendario-personal-741e0.firebaseapp.com",
            projectId: "calendario-personal-741e0",
            storageBucket: "calendario-personal-741e0.firebasestorage.app",
            messagingSenderId: "89547012478",
            appId: "1:89547012478:web:8f42ac1261f7bb39f4db2f"
        };

        // Si estamos en el entorno de pruebas, usamos la config del sistema
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        }

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'calendario-guardias-kaio';

        // --- 2. VARIABLES DE ESTADO ---
        let datosGuardias = {};
        let basesAnuales = {};
        let horasExtrasPorAnio = {};
        let diaSeleccionadoStr = null;
        let botonDiaRef = null;
        let mesSeleccionadoData = null;
        let soloLectura = localStorage.getItem('soloLectura') === 'true';
        let ocultarDinero = localStorage.getItem('ocultarDinero') === 'true';

        const cloudStatus = document.getElementById('cloud-status');
        const contenedorMeses = document.getElementById('contenedor-meses');
        const selectAnio = document.getElementById('select-anio');

        const preciosG = { 
            'FSM':0, 'FSM 112':0, 'G':27.55, 'G112':27.55, 'GFF':69.60, 'GFF 112':69.60,
            'LOC':7.32, 'LFF':18.48, 'L112 M':7.32, 'LFF112 M':18.48, 'L112 T':7.32, 'LFF112 T':18.48 
        };
        
        const sedesDefinidas = [
            {nombre: 'Princesa', sub: 'Prin.'}, {nombre: 'Rosario Pino', sub: 'P. Cast'},
            {nombre: 'S. Compostela', sub: 'Aud.'}, {nombre: 'Gral. Castaños', sub: 'TSJ'},
            {nombre: 'Embajadores', sub: 'Emb.'}, {nombre: 'J. Camarillo 11', sub: 'J. Cam.'}
        ];

        const estilosT = { 
            'M7':'bg-blue-100 text-blue-800', 'M8':'bg-cyan-100 text-cyan-800', 'M9':'bg-sky-100 text-sky-800', 
            'TT':'bg-orange-100 text-orange-800', 'V':'bg-emerald-100 text-emerald-800', 
            'L':'bg-green-100 text-green-800', 'IV':'bg-yellow-100 text-yellow-800',
            'Sede': 'bg-purple-100 text-purple-800'
        };

        // --- 3. CONEXIÓN DIRECTA A FIRESTORE (sin login) ---
        const USER_ID = 'usuario-principal';
        const docRef = doc(db, 'mis-guardias', USER_ID, 'appData', 'estado');

        cloudStatus.classList.remove('hidden');
        cloudStatus.classList.add('flex');

        function setCloudStatus(estado) {
            cloudStatus.classList.remove('bg-yellow-300','bg-green-400','bg-red-400','bg-gray-300','dark:bg-yellow-500','dark:bg-green-600','dark:bg-red-600');
            if (estado === 'guardando') {
                cloudStatus.classList.add('bg-yellow-300','dark:bg-yellow-500');
            } else if (estado === 'ok') {
                cloudStatus.classList.add('bg-green-400','dark:bg-green-600');
            } else if (estado === 'error') {
                cloudStatus.classList.add('bg-red-400','dark:bg-red-600');
            } else {
                cloudStatus.classList.add('bg-gray-300');
            }
        }
        setCloudStatus('guardando');

        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const d = snap.data();
                datosGuardias = d.guardias || {};
                basesAnuales = d.bases || {};
                horasExtrasPorAnio = d.horas || {};
                cargarAnio(parseInt(selectAnio.value));
                setCloudStatus('ok');
            } else {
                guardarTodo();
            }
        }, (err) => {
            console.error("Error al sincronizar:", err);
            setCloudStatus('error');
        });

        async function guardarTodo() {
            setCloudStatus('guardando');
            try {
                await setDoc(docRef, {
                    guardias: datosGuardias,
                    bases: basesAnuales,
                    horas: horasExtrasPorAnio,
                    updatedAt: new Date().toISOString()
                });
                setCloudStatus('ok');
            } catch (err) {
                console.error("Error al guardar:", err);
                setCloudStatus('error');
            }
        }

        // --- 4. LÓGICA DE CALENDARIO ---
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        for(let a=hoy.getFullYear()-1; a<=hoy.getFullYear()+2; a++) {
            const o = document.createElement('option'); o.value=a; o.textContent=a;
            o.className = "bg-white dark:bg-gray-800";
            if(a===hoy.getFullYear()) o.selected=true;
            selectAnio.appendChild(o);
        }

        function cargarAnio(anio) {
            contenedorMeses.innerHTML = '';
            for(let m=0; m<12; m++) contenedorMeses.appendChild(crearMes(anio, m));
            actualizarGlobal();
            actualizarEstadisticas(anio);
        }

        function crearMes(anio, mes) {
            const wrap = document.createElement('div');
            wrap.className = 'bg-gray-50 dark:bg-gray-800 p-5 rounded-[2rem] shadow-sm border border-gray-100 dark:border-gray-700 transition-colors';
            wrap.id = `mes-${anio}-${mes}`;
            const fMes = new Date(anio, mes);
            const nombre = new Intl.DateTimeFormat('es-ES', {month:'long'}).format(fMes);
            
            let html = `<div class="flex justify-between items-center mb-5">
                <h2 class="font-black capitalize dark:text-white text-lg tracking-tight">${nombre}</h2>
                <div class="flex gap-3 items-center">
                    <button class="cam-btn text-xl opacity-60 hover:opacity-100 active:scale-90 transition-all">📸</button>
                    <div id="badge-${anio}-${mes}" class="bg-emerald-100 dark:bg-emerald-900/50 text-emerald-800 dark:text-emerald-300 px-3 py-1.5 rounded-2xl text-[11px] font-black ${ocultarDinero?'hidden':''}">
                        <span id="total-${anio}-${mes}">0 €</span>
                    </div>
                </div>
            </div><div class="grid grid-cols-7 gap-1 text-[10px] text-center opacity-30 mb-3 font-black uppercase"><div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div class="text-red-500">S</div><div class="text-red-500">D</div></div>`;
            
            const grid = document.createElement('div'); grid.className = 'grid grid-cols-7 gap-2';
            const startDay = new Date(anio, mes, 1).getDay() || 7;
            for(let i=1; i<startDay; i++) grid.appendChild(document.createElement('div'));
            
            const daysInMonth = new Date(anio, mes+1, 0).getDate();
            let totalMes = 0;

            for(let i=1; i<=daysInMonth; i++) {
                const fStr = `${anio}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const fObj = new Date(anio, mes, i);
                const data = datosGuardias[fStr] || {};
                const btn = document.createElement('button');
                
                let clases = 'h-14 rounded-2xl text-xs relative flex flex-col items-center justify-center shadow-sm transition-all ';
                const isWeekend = fObj.getDay() === 0 || fObj.getDay() === 6;

                if(data.turno || data.guardia) {
                    if(data.turno) clases += (estilosT[data.turno.tipo] || 'bg-purple-100 text-purple-800');
                    else clases += 'bg-orange-100 text-orange-800';
                } else {
                    clases += isWeekend ? 'bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300' : 'bg-white dark:bg-gray-700';
                }
                if(fObj < hoy) clases += ' dia-pasado';
                if(fObj.getTime() === hoy.getTime()) clases += ' ring-4 ring-blue-500/30 border-blue-500 dark:border-blue-400 border-2';

                btn.className = clases;
                btn.innerHTML = `<span class="${(data.turno||data.guardia)?'absolute top-1.5 left-2 text-[9px]':''} font-bold">${i}</span>`;
                
                if(data.turno) btn.innerHTML += `<span class="font-black mt-1 text-[10px] leading-none uppercase tracking-tighter">${data.turno.subtipo || data.turno.tipo}</span>`;
                if(data.guardia) {
                    btn.innerHTML += `<span class="text-[8px] bg-white/60 dark:bg-black/20 px-1 rounded-md mt-1 font-black text-red-700 dark:text-red-400">${data.guardia.subtipo}</span>`;
                    totalMes += (data.guardia.precio || 0);
                }
                if(data.nota) btn.innerHTML += `<span class="absolute top-1.5 right-2 w-1.5 h-1.5 bg-red-500 rounded-full shadow-sm"></span>`;
                if(data.horasExtras) {
                    const colorH = data.horasExtras > 0 ? 'text-green-600' : 'text-blue-600';
                    btn.innerHTML += `<span class="absolute bottom-1 right-2 text-[8px] font-black ${colorH}">${data.horasExtras > 0 ? '+':''}${data.horasExtras}h</span>`;
                }

                btn.onclick = () => {
                    if(soloLectura) {
                        const icon = document.getElementById('btn-toggle-candado');
                        icon.classList.add('scale-150', 'bg-red-200');
                        setTimeout(() => icon.classList.remove('scale-150', 'bg-red-200'), 300);
                        return;
                    }
                    diaSeleccionadoStr = fStr; botonDiaRef = btn; mesSeleccionadoData = {anio, mes, fObj};
                    document.getElementById('titulo-modal').textContent = `${i} de ${nombre.split(' ')[0]}`;
                    document.getElementById('input-nota').value = data.nota || '';
                    document.getElementById('count-horas-dia').textContent = data.horasExtras ? (Number.isInteger(data.horasExtras) ? data.horasExtras : data.horasExtras) : 0;
                    document.getElementById('modal-turno').classList.remove('hidden');
                };
                grid.appendChild(btn);
            }
            
            wrap.innerHTML = html;
            wrap.appendChild(grid);
            const spanTotal = wrap.querySelector(`#total-${anio}-${mes}`);
            if(spanTotal) spanTotal.textContent = totalMes.toFixed(2) + ' €';
            wrap.querySelector('.cam-btn').onclick = (e) => { e.stopPropagation(); compartirMes(anio, mes); };
            return wrap;
        }

        function actualizarGlobal() {
            let t = 0; Object.values(datosGuardias).forEach(d => { if(d.guardia) t += d.guardia.precio; });
            document.getElementById('total-global').textContent = ocultarDinero ? '*** €' : t.toFixed(2) + ' €';
            document.getElementById('icono-ojo').textContent = ocultarDinero ? '🙈' : '👁️';
        }

        function actualizarEstadisticas(anio) {
            let v=0, ap=0, hTotal=0;
            const guardiasConteo = {};
            
            Object.keys(datosGuardias).forEach(fecha => {
                if(fecha.startsWith(anio)) {
                    const d = datosGuardias[fecha];
                    if(d.turno?.tipo === 'V') v++;
                    if(d.turno?.tipo === 'AP') ap++;
                    if(d.horasExtras) hTotal += d.horasExtras;
                    if(d.guardia) guardiasConteo[d.guardia.subtipo] = (guardiasConteo[d.guardia.subtipo] || 0) + 1;
                }
            });

            const baseV = basesAnuales[anio]?.v || 22;
            const baseAP = basesAnuales[anio]?.ap || 6;

            document.getElementById('stats-year-label').textContent = anio;
            document.getElementById('count-v').textContent = v;
            document.getElementById('display-base-v').textContent = baseV;
            document.getElementById('input-base-v').value = baseV;
            document.getElementById('count-ap').textContent = ap;
            document.getElementById('display-base-ap').textContent = baseAP;
            document.getElementById('input-base-ap').value = baseAP;
            
            const elH = document.getElementById('total-horas-global');
            elH.textContent = (hTotal > 0 ? '+' : '') + hTotal + 'h';
            elH.className = `text-xl font-black ${hTotal >= 0 ? 'text-blue-600' : 'text-red-600'}`;

            const dg = document.getElementById('contenedor-desglose-guardias'); dg.innerHTML = '';
            Object.entries(guardiasConteo).sort().forEach(([tipo, num]) => {
                dg.innerHTML += `<div class="bg-white dark:bg-gray-700 p-3 rounded-2xl flex justify-between font-black shadow-sm border border-gray-100 dark:border-gray-600"><span>${tipo}</span> <span class="text-red-500 bg-red-50 dark:bg-red-900/30 px-2 rounded-lg">${num}</span></div>`;
            });
        }

        // --- 5. EVENTOS ---
        document.querySelectorAll('.opcion-turno').forEach(btn => {
            btn.onclick = () => {
                const cat = btn.dataset.categoria;
                let d = datosGuardias[diaSeleccionadoStr] || {};
                if(cat === 'borrar') d = {};
                else if(cat === 'turno') {
                    if(btn.dataset.tipo === 'ninguno') delete d.turno;
                    else d.turno = { tipo: btn.dataset.tipo, subtipo: btn.dataset.subtipo || null };
                } else if(cat === 'guardia') {
                    if(btn.dataset.subtipo === 'ninguno') delete d.guardia;
                    else d.guardia = { subtipo: btn.dataset.subtipo, precio: parseFloat(btn.dataset.precio) };
                }
                datosGuardias[diaSeleccionadoStr] = d;
                finalizarEdicion();
            };
        });

        function finalizarEdicion() {
            const d = datosGuardias[diaSeleccionadoStr] || {};
            d.nota = document.getElementById('input-nota').value.trim();
            d.horasExtras = parseFloat(document.getElementById('count-horas-dia').textContent) || 0;
            if(!d.turno && !d.guardia && !d.nota && !d.horasExtras) delete datosGuardias[diaSeleccionadoStr];
            else datosGuardias[diaSeleccionadoStr] = d;
            guardarTodo();
            document.getElementById('modal-turno').classList.add('hidden');
            document.getElementById('vista-principal').classList.remove('hidden');
            document.getElementById('vista-guardias').classList.add('hidden');
            document.getElementById('vista-sedes').classList.add('hidden');
            cargarAnio(parseInt(selectAnio.value));
        }

        document.getElementById('btn-guardar-nota').onclick = finalizarEdicion;
        document.getElementById('btn-sumar-hora-dia').onclick = () => { let c = document.getElementById('count-horas-dia'); c.textContent = (parseFloat(c.textContent)+0.5).toFixed(1).replace('.0',''); };
        document.getElementById('btn-restar-hora-dia').onclick = () => { let c = document.getElementById('count-horas-dia'); c.textContent = (parseFloat(c.textContent)-0.5).toFixed(1).replace('.0',''); };

        document.getElementById('btn-abrir-stats').onclick = () => document.getElementById('modal-stats').classList.remove('hidden');
        document.getElementById('btn-cerrar-stats').onclick = () => document.getElementById('modal-stats').classList.add('hidden');
        document.getElementById('btn-cerrar-modal').onclick = () => document.getElementById('modal-turno').classList.add('hidden');
        
        document.getElementById('btn-toggle-candado').onclick = (e) => { 
            soloLectura = !soloLectura; 
            localStorage.setItem('soloLectura', soloLectura); 
            e.target.textContent = soloLectura ? '🔒':'🔓'; 
        };

        document.getElementById('btn-toggle-dinero').onclick = () => { 
            ocultarDinero = !ocultarDinero; 
            localStorage.setItem('ocultarDinero', ocultarDinero); 
            cargarAnio(parseInt(selectAnio.value)); 
        };

        document.getElementById('btn-tema').onclick = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        };

        document.getElementById('btn-hoy').onclick = () => { 
            selectAnio.value = hoy.getFullYear(); 
            cargarAnio(hoy.getFullYear()); 
            setTimeout(() => {
                const el = document.getElementById(`mes-${hoy.getFullYear()}-${hoy.getMonth()}`);
                if(el) el.scrollIntoView({behavior:'smooth', block: 'start'});
            }, 100);
        };

        // Submenús
        document.getElementById('btn-menu-guardias').onclick = () => { document.getElementById('vista-principal').classList.add('hidden'); document.getElementById('vista-guardias').classList.remove('hidden'); };
        document.getElementById('btn-volver-principal').onclick = () => { document.getElementById('vista-principal').classList.remove('hidden'); document.getElementById('vista-guardias').classList.add('hidden'); };
        document.getElementById('btn-menu-sedes').onclick = () => { document.getElementById('vista-principal').classList.add('hidden'); document.getElementById('vista-sedes').classList.remove('hidden'); };
        document.getElementById('btn-volver-principal-sedes').onclick = () => { document.getElementById('vista-principal').classList.remove('hidden'); document.getElementById('vista-sedes').classList.add('hidden'); };

        // Grid Guardias
        const gGrid = document.getElementById('grid-guardias');
        Object.entries(preciosG).sort().forEach(([k,v]) => {
            const b = document.createElement('button'); 
            b.className = 'p-3 bg-red-50 dark:bg-red-900/30 text-[10px] font-black rounded-2xl border border-red-100 dark:border-red-800 shadow-sm uppercase'; 
            b.textContent = k;
            b.onclick = () => { 
                datosGuardias[diaSeleccionadoStr] = {...(datosGuardias[diaSeleccionadoStr]||{}), guardia: {subtipo:k, precio:v}}; 
                finalizarEdicion(); 
            };
            gGrid.appendChild(b);
        });

        // Grid Sedes
        const sGrid = document.getElementById('grid-sedes');
        sedesDefinidas.forEach(s => {
            const b = document.createElement('button');
            b.className = 'p-3 bg-purple-50 dark:bg-purple-900/30 text-[10px] font-black rounded-2xl border border-purple-100 dark:border-purple-800 shadow-sm uppercase leading-tight';
            b.innerHTML = `<span>${s.nombre}</span><br><span class="text-[8px] opacity-40">${s.sub}</span>`;
            b.onclick = () => {
                datosGuardias[diaSeleccionadoStr] = {...(datosGuardias[diaSeleccionadoStr]||{}), turno: {tipo:'Sede', subtipo:s.sub}};
                finalizarEdicion();
            };
            sGrid.appendChild(b);
        });

        document.getElementById('input-base-v').oninput = () => {
            basesAnuales[parseInt(selectAnio.value)] = { v: parseInt(document.getElementById('input-base-v').value) || 22, ap: parseInt(document.getElementById('input-base-ap').value) || 6 };
            guardarTodo(); actualizarEstadisticas(parseInt(selectAnio.value));
        };
        document.getElementById('input-base-ap').oninput = document.getElementById('input-base-v').oninput;

        async function compartirMes(a, m) {
            const el = document.getElementById(`mes-${a}-${m}`);
            const cam = el.querySelector('.cam-btn');
            const badge = el.querySelector(`#badge-${a}-${m}`);
            cam.style.visibility = 'hidden';
            if(badge) badge.style.display = 'none';
            const canvas = await html2canvas(el, { backgroundColor: document.documentElement.classList.contains('dark') ? '#111827':'#f3f4f6', scale: 2, borderRadius: 32 });
            cam.style.visibility = 'visible';
            if(badge && !ocultarDinero) badge.style.display = 'block';
            canvas.toBlob(blob => {
                const file = new File([blob], `cuadrante-${m+1}.png`, {type:'image/png'});
                if(navigator.share && /Android|iPhone|iPad/i.test(navigator.userAgent)) navigator.share({files:[file]});
                else { const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `cuadrante-${m+1}.png`; link.click(); }
            });
        }

        selectAnio.onchange = () => cargarAnio(parseInt(selectAnio.value));
        if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        cargarAnio(hoy.getFullYear());
    </script>
</body>
</html>
